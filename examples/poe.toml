name = "poe"
description = "Example provider config for cli-imagine"

[endpoint]
base_url = "https://api.example.com/v1"
proxy_url = "http://127.0.0.1:8001"

[auth]
api_key_env = "POE_API_KEY"

[[models]]
name = "GPT-Image-1"

[models.capabilities.generate]
input_schema = "schemas/poe/GPT-Image-1.generate.json"

[models.capabilities.generate.request]
kind = "chat_completions"
size_mode = "ratio_or_pixel"
aspect_field = "aspect"

[models.capabilities.generate.response]
default_format = "url"
parser_by_format = { url = "message_content_image" }

[[models]]
name = "gemini-2.5-flash-image-edit"

[models.capabilities.edit]
input_schema = "schemas/poe/gemini-2.5-flash-image-edit.edit.json"

[models.capabilities.edit.request]
kind = "images_edit"
size_mode = "standard"

[models.capabilities.edit.response]
default_format = "b64_json"
parser_by_format = { b64_json = "data_b64_json" }
