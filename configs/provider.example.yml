name: your-provider
endpoint:
  baseUrl: https://api.example.com/v1
auth:
  apiKey: your-api-key
models:
  - name: your-model-generate
    capabilities:
      generate:
        inputSchema:
          type: object
          properties:
            model:
              type: string
              minLength: 1
            prompt:
              type: string
              minLength: 1
            size:
              type: string
              enum: ["1:1", "4:3", "16:9"]
            aspectRatio:
              type: string
              enum: ["1:1", "4:3", "16:9"]
            outputName:
              type: string
          required: [model, prompt]
          anyOf:
            - required: [size]
            - required: [aspectRatio]
          additionalProperties: false
        request:
          kind: chat_completions
          sizeMode: ratio
          aspectField: aspect
        response:
          defaultFormat: url
          allowedFormats: []
          parserByFormat:
            url: message_content_image
  - name: your-model-edit
    capabilities:
      edit:
        inputSchema:
          type: object
          properties:
            model:
              type: string
              minLength: 1
            prompt:
              type: string
              minLength: 1
            images:
              type: array
              minItems: 1
              items:
                type: string
                minLength: 1
            size:
              type: string
              pattern: ^\d+x\d+$
            outputName:
              type: string
          required: [model, prompt, images, size]
          additionalProperties: false
        request:
          kind: images_edit
          sizeMode: pixel_x
        response:
          defaultFormat: b64_json
          allowedFormats: []
          parserByFormat:
            b64_json: data_b64_json
